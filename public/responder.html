<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizForge — Responder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f0;--surface:#ffffff;--surface2:#f0ede8;--border:#e0dbd2;--border2:#ccc8be;--text:#1a1814;--muted:#7a7570;--accent:#2a52a8;--accent-light:#eef1fc;--red:#c0392b;--red-light:#fdf0ee;--green:#1e7c4a;--green-light:#eefaf3;--gold:#a06b00;--gold-light:#fdf7e8;--warn-light:#fff3e8;--radius:10px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(transparent,transparent 27px,var(--border) 28px);opacity:0.3;pointer-events:none;}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;background:var(--text);border-bottom:3px solid var(--accent);}
.logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.logo em{color:#90aaff;font-style:normal;}
.logo a{color:inherit;text-decoration:none;}
.badge{padding:5px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:20px;font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.8);letter-spacing:0.06em;text-transform:uppercase;}
main{flex:1;max-width:760px;width:100%;margin:0 auto;padding:48px 24px;}
.page{display:none;animation:fadeUp 0.3s ease;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
h1{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:-0.03em;line-height:1.1;margin-bottom:8px;}
h2{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;}
.sub{color:var(--muted);font-size:0.9rem;margin-bottom:36px;}
label{display:block;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
input[type=text]{width:100%;padding:13px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:1rem;outline:none;transition:border-color 0.2s;}
input[type=text]:focus{border-color:var(--accent);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 26px;border-radius:8px;border:2px solid transparent;font-family:'Instrument Sans',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.15s;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#1e3d82;}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border2);}
.btn-outline:hover{border-color:var(--text);}
.btn-full{width:100%;}
.btn-lg{padding:16px 32px;font-size:1rem;}
.start-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:40px;box-shadow:0 2px 0 var(--border2),0 8px 32px rgba(0,0,0,0.06);}
.start-icon{font-size:3rem;margin-bottom:20px;display:block;}
.field{margin-bottom:20px;}
.quiz-pick{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:14px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 0 var(--border2);}
.quiz-pick:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 16px rgba(42,82,168,0.12);}
.qp-title{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;margin-bottom:5px;}
.qp-meta{font-size:0.8rem;color:var(--muted);}
.quiz-hdr{background:var(--text);color:#fff;border-radius:12px;padding:24px 28px;margin-bottom:28px;}
.qh-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:6px;}
.qh-row{display:flex;align-items:center;justify-content:space-between;}
.qh-progress{font-size:0.8rem;color:rgba(255,255,255,0.6);}
.progress-bar{height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;}
.timer{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;padding:5px 14px;border-radius:20px;background:rgba(255,255,255,0.1);letter-spacing:0.04em;}
.timer.warn{background:rgba(160,107,0,0.4);color:#ffd080;}
.timer.danger{background:rgba(192,57,43,0.5);color:#ff9090;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.q-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:0 2px 0 var(--border2),0 4px 20px rgba(0,0,0,0.04);}
.q-type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;}
.tb-mc{background:var(--accent-light);color:var(--accent);}
.tb-tf{background:var(--gold-light);color:var(--gold);}
.tb-fill{background:var(--red-light);color:var(--red);}
.tb-order{background:var(--green-light);color:var(--green);}
.q-text{font-size:1.1rem;font-weight:600;line-height:1.55;margin-bottom:20px;}
.mc-opts{list-style:none;}
.mc-opt{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:9px;cursor:pointer;transition:all 0.15s;background:var(--surface);}
.mc-opt:hover{border-color:var(--text);}
.mc-opt.sel{border-color:var(--accent);background:var(--accent-light);}
.mc-opt.correct{border-color:var(--green);background:var(--green-light);}
.mc-opt.wrong{border-color:var(--red);background:var(--red-light);}
.mc-opt.neutral-after{opacity:0.5;}
.opt-ltr{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:800;flex-shrink:0;transition:all 0.15s;}
.mc-opt.sel .opt-ltr{background:var(--accent);color:#fff;}
.mc-opt.correct .opt-ltr{background:var(--green);color:#fff;}
.mc-opt.wrong .opt-ltr{background:var(--red);color:#fff;}
.tf-opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.tf-btn{padding:20px;border:2px solid var(--border);border-radius:8px;background:var(--surface);font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;cursor:pointer;transition:all 0.15s;text-align:center;}
.tf-btn:hover{border-color:var(--text);}
.tf-btn.sel{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.tf-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green);}
.tf-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red);}
.fill-wrap{margin-top:4px;}
.fill-wrap input{font-size:1rem;padding:14px 16px;}
.fill-hint{font-size:0.78rem;color:var(--muted);margin-top:8px;font-style:italic;}
.order-list{list-style:none;}
.order-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px;background:var(--surface);cursor:grab;user-select:none;transition:all 0.15s;}
.order-item:active{cursor:grabbing;}
.order-item.dragging{opacity:0.35;}
.order-item.drag-over{border-color:var(--accent);background:var(--accent-light);}
.order-item.correct{border-color:var(--green);background:var(--green-light);}
.order-item.wrong{border-color:var(--red);background:var(--red-light);}
.ord-num{width:30px;height:30px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.75rem;font-weight:800;flex-shrink:0;}
.feedback{padding:13px 16px;border-radius:8px;margin-top:16px;font-size:0.9rem;font-weight:600;display:none;border-left:4px solid transparent;}
.feedback.show{display:block;}
.fb-correct{background:var(--green-light);border-left-color:var(--green);color:var(--green);}
.fb-partial{background:var(--gold-light);border-left-color:var(--gold);color:var(--gold);}
.fb-wrong{background:var(--red-light);border-left-color:var(--red);color:var(--red);}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1.5px solid var(--border);}
.nav-center{display:flex;gap:10px;}
.score-hero{background:var(--text);color:#fff;border-radius:14px;padding:40px;text-align:center;margin-bottom:28px;}
.score-name{font-size:0.8rem;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.score-big{font-family:'Syne',sans-serif;font-size:4rem;font-weight:800;line-height:1;margin-bottom:6px;}
.score-pct{font-size:1rem;color:rgba(255,255,255,0.6);margin-bottom:12px;}
.score-grade{display:inline-block;padding:6px 18px;border-radius:20px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}
.result-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;border-left:4px solid var(--border2);}
.ri-correct{border-left-color:var(--green);}
.ri-partial{border-left-color:var(--gold);}
.ri-wrong{border-left-color:var(--red);}
.ri-q{font-size:0.95rem;font-weight:600;margin-bottom:6px;line-height:1.5;}
.ri-meta{font-size:0.78rem;color:var(--muted);}
.ri-pts{float:right;font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:800;margin-left:12px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:14px;}
.empty-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:8px;}
.timeout-card{background:var(--red-light);border:2px solid var(--red);border-radius:14px;padding:40px;text-align:center;}
.timeout-icon{font-size:3rem;margin-bottom:16px;}
.timeout-title{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--red);margin-bottom:8px;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(42,82,168,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:600px){header{padding:0 16px;}main{padding:24px 14px;}h1{font-size:1.7rem;}.tf-opts{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="logo"><a href="/">Quiz<em>Forge</em></a></div>
  <div class="badge">📖 Responder</div>
</header>
<main>

  <!-- START -->
  <div class="page active" id="p-start">
    <div class="start-card">
      <span class="start-icon">📝</span>
      <h1 style="margin-bottom:8px;">Start a Quiz</h1>
      <div class="sub">Enter your details to continue</div>
      <div class="field"><label>First &amp; Last Name</label><input type="text" id="s-name" placeholder="e.g. Thabo Nkosi"></div>
      <div class="field"><label>Responder ID</label><input type="text" id="s-num" placeholder="e.g. ID123456"></div>
      <button class="btn btn-primary btn-full btn-lg" onclick="goPickQuiz()">Continue →</button>
    </div>
  </div>

  <!-- PICK -->
  <div class="page" id="p-pick">
    <h1>Available Quizzes</h1>
    <div class="sub" id="pick-sub"></div>
    <div id="quiz-pick-list"></div>
  </div>

  <!-- TAKING -->
  <div class="page" id="p-quiz">
    <div class="quiz-hdr">
      <div class="qh-title" id="qh-title"></div>
      <div class="qh-row">
        <div class="qh-progress" id="qh-prog"></div>
        <div class="timer" id="timer" style="display:none;">--:--</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <div id="q-area"></div>
    <div class="nav-row">
      <button class="btn btn-outline" id="btn-prev" onclick="prevQ()" style="visibility:hidden;">← Prev</button>
      <div class="nav-center" id="nav-center"></div>
      <button class="btn btn-outline" id="btn-next" onclick="nextQ()" style="visibility:hidden;">Next →</button>
    </div>
  </div>

  <!-- TIMEOUT -->
  <div class="page" id="p-timeout">
    <div class="timeout-card">
      <div class="timeout-icon">⏰</div>
      <div class="timeout-title">Time's Up!</div>
      <p style="color:var(--muted);margin-bottom:24px;">Your answers have been automatically submitted.</p>
      <button class="btn btn-primary" onclick="showResults()">View My Results</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="page" id="p-results">
    <div class="score-hero">
      <div class="score-name" id="res-name"></div>
      <div class="score-big" id="res-score"></div>
      <div class="score-pct" id="res-pct"></div>
      <span class="score-grade" id="res-grade"></span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <h2>Question Review</h2>
      <button class="btn btn-outline" style="font-size:0.78rem;padding:8px 14px;" onclick="restart()">← Back to Quizzes</button>
    </div>
    <div id="res-breakdown"></div>
  </div>

</main>
</div>

<script>
// ════════════════════════════════════════════════════
// API
// ════════════════════════════════════════════════════
async function api(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch('/api'+path,opts);
  const data=await r.json();
  if(!r.ok) throw new Error(data.error||'Request failed');
  return data;
}

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let responderName='',responderId='';
let activeQuiz=null;
let answers=[];
let checked=[];
let shuffled=[];
let currentQ=0;
let timerInterval=null;
let secondsLeft=0;
let startTime=null;
let submitted=false;

// ════════════════════════════════════════════════════
// PAGES
// ════════════════════════════════════════════════════
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}

// ════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════
async function goPickQuiz(){
  const name=document.getElementById('s-name').value.trim();
  const num=document.getElementById('s-num').value.trim();
  if(!name){alert('Please enter your name.');return;}
  if(!num){alert('Please enter your Responder ID.');return;}
  responderName=name;responderId=num;
  await renderPick();
  showPage('p-pick');
}

async function renderPick(){
  document.getElementById('pick-sub').textContent=`Hello, ${responderName} — choose a quiz to begin`;
  const el=document.getElementById('quiz-pick-list');
  el.innerHTML=`<div class="empty"><div class="spinner"></div></div>`;
  try{
    const quizzes=await api('GET','/quizzes');
    const available=quizzes.filter(q=>q.questions&&q.questions.length>0);
    if(!available.length){
      el.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-title">No quizzes available</div><p>Check back later.</p></div>`;
      return;
    }
    // Check which quizzes this responder already submitted
    const checks=await Promise.all(available.map(q=>api('GET',`/check/${q.id}/${encodeURIComponent(responderId)}`).catch(()=>({submitted:false}))));
    el.innerHTML=available.map((q,i)=>{
      const pts=totalPts(q);
      const time=q.time_mins?q.time_mins+' min':'No time limit';
      const done=checks[i]?.submitted;
      if(done){
        return `<div class="quiz-pick" style="opacity:0.6;cursor:not-allowed;border-color:var(--green);" onclick="showAlreadySubmitted('${q.id}')">
          <div>
            <div class="qp-title">${esc(q.title)}</div>
            <div class="qp-meta">${q.questions.length} questions · ${pts} pts · ⏱ ${time}</div>
            <div style="font-size:0.78rem;color:var(--green);font-weight:700;margin-top:4px;">✓ Already submitted — click to view your result</div>
          </div>
          <span style="font-size:1.3rem;color:var(--green);">✓</span>
        </div>`;
      }
      return `<div class="quiz-pick" onclick="startQuiz('${q.id}')">
        <div>
          <div class="qp-title">${esc(q.title)}</div>
          <div class="qp-meta">${q.questions.length} questions · ${pts} pts · ⏱ ${time}${q.description?' · '+esc(q.description):''}</div>
        </div>
        <span style="font-size:1.3rem;color:var(--muted);">›</span>
      </div>`;
    }).join('');
  }catch(e){el.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Could not load quizzes</div><p>${e.message}</p></div>`;}
}

// Show already-submitted result
async function showAlreadySubmitted(quizId){
  try{
    const check=await api('GET',`/check/${quizId}/${encodeURIComponent(responderId)}`);
    if(!check.submitted) return;
    activeQuiz=await api('GET',`/quizzes/${quizId}`);
    answers=check.submission.answers;
    checked=new Array(activeQuiz.questions.length).fill(true);
    shuffled=activeQuiz.questions.map(q=>q.type==='order'?[...q.items]:null);
    submitted=true;
    showResults();
  }catch(e){alert('Could not load your previous result.');}
}

// ════════════════════════════════════════════════════
// START QUIZ
// ════════════════════════════════════════════════════
async function startQuiz(id){
  // Double-check they haven't already submitted
  try{
    const check=await api('GET',`/check/${id}/${encodeURIComponent(responderId)}`);
    if(check.submitted){
      alert('You have already submitted this quiz. Your previous result will be shown.');
      showAlreadySubmitted(id);
      return;
    }
  }catch(e){}

  try{activeQuiz=await api('GET',`/quizzes/${id}`);}
  catch(e){alert('Could not load quiz.');return;}

  // Check for saved progress (resumed session)
  let savedProgress=null;
  try{savedProgress=await api('GET',`/progress/${id}/${encodeURIComponent(responderId)}`);}
  catch(e){}

  if(savedProgress){
    // Restore where they left off
    answers=savedProgress.answers;
    checked=savedProgress.checked;
    shuffled=savedProgress.shuffled;
    currentQ=savedProgress.current_q||0;
  } else {
    answers=new Array(activeQuiz.questions.length).fill(null);
    checked=new Array(activeQuiz.questions.length).fill(false);
    shuffled=activeQuiz.questions.map(q=>q.type==='order'?shuffle([...q.items]):null);
    currentQ=0;
    // Save initial progress immediately
    await saveProgress();
  }

  submitted=false;
  startTime=Date.now();
  document.getElementById('qh-title').textContent=activeQuiz.title;
  showPage('p-quiz');

  if(activeQuiz.time_mins&&activeQuiz.time_mins>0){
    // If resuming, reduce time by how long they've been going
    secondsLeft=activeQuiz.time_mins*60;
    startTimer();
  } else {
    document.getElementById('timer').style.display='none';
  }
  renderQ();
}

// ════════════════════════════════════════════════════
// SAVE PROGRESS
// ════════════════════════════════════════════════════
async function saveProgress(){
  if(!activeQuiz||submitted) return;
  try{
    await api('POST','/progress',{
      quiz_id:activeQuiz.id,
      responder_id:responderId,
      name:responderName,
      answers:[...answers],
      checked:[...checked],
      shuffled:[...shuffled],
      current_q:currentQ
    });
  }catch(e){console.warn('Progress save failed:',e);}
}

// ════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════
function startTimer(){
  const el=document.getElementById('timer');el.style.display='';updateTimerDisplay();
  timerInterval=setInterval(()=>{secondsLeft--;updateTimerDisplay();if(secondsLeft<=0){clearInterval(timerInterval);handleTimeout();}},1000);
}
function updateTimerDisplay(){
  const el=document.getElementById('timer');
  const m=Math.floor(secondsLeft/60),s=secondsLeft%60;
  el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  el.className='timer';
  if(secondsLeft<=60)el.classList.add('danger');
  else if(activeQuiz.time_mins&&secondsLeft<=activeQuiz.time_mins*60*0.2)el.classList.add('warn');
}
async function handleTimeout(){clearInterval(timerInterval);await doSubmit();showPage('p-timeout');}

// ════════════════════════════════════════════════════
// RENDER QUESTION
// ════════════════════════════════════════════════════
function renderQ(){
  const quiz=activeQuiz,q=quiz.questions[currentQ],total=quiz.questions.length,isChecked=checked[currentQ];
  document.getElementById('qh-prog').textContent=`Question ${currentQ+1} of ${total}`;
  document.getElementById('prog-fill').style.width=((currentQ+1)/total*100)+'%';
  document.getElementById('btn-prev').style.visibility=currentQ===0?'hidden':'';
  document.getElementById('btn-next').style.visibility=currentQ===total-1?'hidden':'';
  const nc=document.getElementById('nav-center');
  const isLast=currentQ===total-1;
  if(!isChecked)nc.innerHTML=`<button class="btn btn-primary" onclick="checkAnswer()">Check Answer</button>`;
  else if(isLast&&checked.every(Boolean))nc.innerHTML=`<button class="btn btn-primary" onclick="finalSubmit()">Submit Quiz →</button>`;
  else nc.innerHTML='';
  const typeLabel={mc:'Multiple Choice',tf:'True / False',fill:'Fill in Blank',order:'Ordering'};
  const tbCls={mc:'tb-mc',tf:'tb-tf',fill:'tb-fill',order:'tb-order'};
  const ans=answers[currentQ];
  let inner='';

  if(q.type==='mc'){
    inner+=`<ul class="mc-opts">`;
    q.options.forEach((opt,i)=>{
      let cls='';
      if(isChecked){const best=Math.max(...q.options.map(o=>o.pts));cls=opt.pts===best?'correct':ans===i?'wrong':'neutral-after';}
      else if(ans===i)cls='sel';
      inner+=`<li class="mc-opt ${cls}"${isChecked?'':` onclick="selectMC(${i})"`}>
        <div class="opt-ltr">${String.fromCharCode(65+i)}</div><span>${esc(opt.text)}</span>
        ${isChecked?`<span style="margin-left:auto;font-size:0.78rem;opacity:0.6;">${opt.pts}pts</span>`:''}
      </li>`;
    });
    inner+=`</ul>`;
    if(isChecked){
      const chosen=ans!=null?q.options[ans]:null,best=Math.max(...q.options.map(o=>o.pts)),earned=chosen?Math.max(0,chosen.pts):0;
      const cls=earned===best?'fb-correct':earned>0?'fb-partial':'fb-wrong';
      inner+=`<div class="feedback ${cls} show">${earned===best?'✓':earned>0?'◑':'✗'} You earned ${earned} / ${best} pts${chosen?` — "${esc(chosen.text)}"`:' — no answer'}</div>`;
    }
  }
  else if(q.type==='tf'){
    inner+=`<div class="tf-opts">`;
    ['true','false'].forEach(v=>{
      const pts=v==='true'?parseFloat(q.truePts||0):parseFloat(q.falsePts||0);
      const maxPts=Math.max(parseFloat(q.truePts||0),parseFloat(q.falsePts||0));
      const isBest=pts===maxPts;
      let cls='';
      if(isChecked)cls=isBest?'correct':ans===v?'wrong':'';
      else if(ans===v)cls='sel';
      inner+=`<button class="tf-btn ${cls}"${isChecked?'':` onclick="selectTF('${v}')"`}>${v==='true'?'True':'False'}</button>`;
    });
    inner+=`</div>`;
    if(isChecked){
      const earned=ans==='true'?parseFloat(q.truePts||0):ans==='false'?parseFloat(q.falsePts||0):0;
      const max=Math.max(parseFloat(q.truePts||0),parseFloat(q.falsePts||0));
      inner+=`<div class="feedback ${earned===max?'fb-correct':earned>0?'fb-partial':'fb-wrong'} show">${earned===max?'✓':'✗'} You earned ${Math.max(0,earned)} / ${max} pts</div>`;
    }
  }
  else if(q.type==='fill'){
    const disabled=isChecked?'disabled':'';
    const borderStyle=isChecked?(ans&&q.answers.includes(ans.toLowerCase())?'border-color:var(--green);background:var(--green-light);':'border-color:var(--red);background:var(--red-light);'):'';
    inner+=`<div class="fill-wrap"><input type="text" id="fill-input" placeholder="Type your answer…" value="${esc(ans||'')}" ${disabled} style="${borderStyle}" oninput="answers[currentQ]=this.value">${!isChecked?'<div class="fill-hint">Type your answer then click Check Answer</div>':''}</div>`;
    if(isChecked){const correct=ans&&q.answers.includes(ans.toLowerCase());inner+=`<div class="feedback ${correct?'fb-correct':'fb-wrong'} show">${correct?'✓ Correct! '+q.pts+' pts':'✗ Incorrect. Accepted: '+q.answers.join(' / ')}</div>`;}
  }
  else if(q.type==='order'){
    const current=ans||shuffled[currentQ];
    inner+=`<ul class="order-list" id="order-student-list">`;
    current.forEach((item,i)=>{
      let cls='';if(isChecked)cls=item===q.items[i]?'correct':'wrong';
      inner+=`<li class="order-item ${cls}" draggable="${isChecked?'false':'true'}" data-item="${esc(item)}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondrop="dropItem(event)" ondragleave="dragLeave(event)">
        <span style="color:var(--muted);">${isChecked?'':' ⠿'}</span><div class="ord-num">${i+1}</div><span>${esc(item)}</span>
      </li>`;
    });
    inner+=`</ul>`;
    if(!isChecked)inner+=`<div class="fill-hint">Drag items into the correct order, then click Check Answer</div>`;
    else{const correct=(ans||shuffled[currentQ]).join('|')===q.items.join('|');inner+=`<div class="feedback ${correct?'fb-correct':'fb-wrong'} show">${correct?'✓ Perfect order! '+q.pts+' pts':'✗ Incorrect order.'}</div>`;}
  }

  document.getElementById('q-area').innerHTML=`<div class="q-card"><span class="q-type-badge ${tbCls[q.type]}">${typeLabel[q.type]}</span><div class="q-text">${esc(q.text)}</div>${inner}</div>`;
}

// ════════════════════════════════════════════════════
// ANSWERS
// ════════════════════════════════════════════════════
function selectMC(i){if(checked[currentQ])return;answers[currentQ]=i;renderQ();}
function selectTF(v){if(checked[currentQ])return;answers[currentQ]=v;renderQ();}

async function checkAnswer(){
  const q=activeQuiz.questions[currentQ];
  if(q.type==='fill'){const fi=document.getElementById('fill-input');answers[currentQ]=fi?fi.value.trim():'';}
  if(q.type==='order'){const items=[...document.querySelectorAll('#order-student-list .order-item')];answers[currentQ]=items.map(el=>el.dataset.item);}
  if(q.type==='mc'&&answers[currentQ]===null){alert('Please select an option.');return;}
  if(q.type==='tf'&&!answers[currentQ]){alert('Please select True or False.');return;}
  checked[currentQ]=true;
  // Save progress to DB every time an answer is checked
  await saveProgress();
  renderQ();
}

function prevQ(){if(currentQ>0){currentQ--;renderQ();}}
function nextQ(){if(currentQ<activeQuiz.questions.length-1){currentQ++;renderQ();}}

// ════════════════════════════════════════════════════
// SUBMIT
// ════════════════════════════════════════════════════
async function finalSubmit(){
  clearInterval(timerInterval);
  const fi=document.getElementById('fill-input');if(fi)answers[currentQ]=fi.value.trim();
  const oi=document.getElementById('order-student-list');if(oi)answers[currentQ]=[...oi.querySelectorAll('.order-item')].map(el=>el.dataset.item);
  await doSubmit();
  showResults();
}

async function doSubmit(){
  if(submitted)return;submitted=true;
  const timeTaken=Math.round((Date.now()-startTime)/1000);
  const earned=calcEarned();
  try{
    await api('POST','/submissions',{
      quiz_id:activeQuiz.id,name:responderName,responder_id:responderId,
      answers:[...answers],earned,time_taken:timeTaken
    });
    // Clean up saved progress now that it's fully submitted
    await api('DELETE',`/progress/${activeQuiz.id}/${encodeURIComponent(responderId)}`).catch(()=>{});
  }catch(e){console.error('Submission failed:',e);}
}

function calcEarned(){
  let total=0;
  activeQuiz.questions.forEach((q,i)=>{
    const ans=answers[i];
    if(q.type==='mc'){if(ans!=null)total+=Math.max(0,q.options[ans]?.pts||0);}
    else if(q.type==='tf'){if(ans==='true')total+=Math.max(0,parseFloat(q.truePts||0));else if(ans==='false')total+=Math.max(0,parseFloat(q.falsePts||0));}
    else if(q.type==='fill'){if(ans&&q.answers.includes(ans.toLowerCase()))total+=parseFloat(q.pts||1);}
    else if(q.type==='order'){const order=ans||[];if(order.join('|')===q.items.join('|'))total+=parseFloat(q.pts||1);}
  });
  return total;
}

// ════════════════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════════════════
function showResults(){
  const pts=totalPts(activeQuiz),earned=calcEarned(),pct=pts?Math.round(earned/pts*100):0;
  const grade=pct>=80?'Distinction':pct>=70?'Merit':pct>=50?'Pass':'Fail';
  const gc=pct>=70?'#5dd68c':pct>=50?'#f7c46a':'#f76a6a';
  const gb=pct>=70?'rgba(93,214,140,0.15)':pct>=50?'rgba(247,196,106,0.15)':'rgba(247,106,106,0.15)';
  document.getElementById('res-name').textContent=`${responderName} · ${responderId}`;
  document.getElementById('res-score').textContent=`${earned} / ${pts}`;
  document.getElementById('res-pct').textContent=`${pct}%`;
  document.getElementById('res-grade').textContent=grade;
  document.getElementById('res-grade').style.cssText=`color:${gc};background:${gb};`;
  const typeLabel={mc:'Multiple Choice',tf:'True/False',fill:'Fill in Blank',order:'Ordering'};
  document.getElementById('res-breakdown').innerHTML=activeQuiz.questions.map((q,i)=>{
    const ans=answers[i];let earned2=0,max=0,detail='';
    if(q.type==='mc'){max=Math.max(...q.options.map(o=>o.pts));if(ans!=null)earned2=Math.max(0,q.options[ans]?.pts||0);const chosen=ans!=null?q.options[ans]:null,best=q.options.find(o=>o.pts===max);detail=earned2===max?'Correct':ans===null?'Not answered':`Your: "${chosen?.text||''}" · Best: "${best?.text||''}"`;
    }else if(q.type==='tf'){max=Math.max(parseFloat(q.truePts||0),parseFloat(q.falsePts||0));if(ans==='true')earned2=Math.max(0,parseFloat(q.truePts||0));else if(ans==='false')earned2=Math.max(0,parseFloat(q.falsePts||0));const cv=parseFloat(q.truePts||0)>=parseFloat(q.falsePts||0)?'true':'false';detail=earned2===max?'Correct':ans?`You: ${ans}, correct: ${cv}`:'Not answered';
    }else if(q.type==='fill'){max=parseFloat(q.pts||1);const correct=ans&&q.answers.includes(ans.toLowerCase());if(correct)earned2=max;detail=correct?`Correct: "${ans}"`:`Your: "${ans||''}" · Accepted: ${q.answers.join(', ')}`;
    }else if(q.type==='order'){max=parseFloat(q.pts||1);const order=ans||[],correct=order.join('|')===q.items.join('|');if(correct)earned2=max;detail=correct?'Correct order':'Incorrect order';}
    const cls=earned2===max?'ri-correct':earned2>0?'ri-partial':'ri-wrong';
    return `<div class="result-item ${cls}"><span class="ri-pts">${earned2}/${max}</span><div class="ri-q">${i+1}. ${esc(q.text)}</div><div class="ri-meta">${typeLabel[q.type]} · ${detail}</div></div>`;
  }).join('');
  showPage('p-results');
}

function restart(){clearInterval(timerInterval);activeQuiz=null;submitted=false;renderPick();showPage('p-pick');}

// ════════════════════════════════════════════════════
// DRAG & DROP
// ════════════════════════════════════════════════════
let dragIdx=null;
function dragStart(e){dragIdx=[...e.target.parentNode.children].indexOf(e.target);e.target.classList.add('dragging');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragLeave(e){e.currentTarget.classList.remove('drag-over');}
function dropItem(e){
  e.preventDefault();
  const list=document.getElementById('order-student-list'),items=[...list.querySelectorAll('.order-item')],destIdx=items.indexOf(e.currentTarget);
  if(dragIdx===null||dragIdx===destIdx){e.currentTarget.classList.remove('drag-over');return;}
  const cur=answers[currentQ]||[...shuffled[currentQ]],moved=cur.splice(dragIdx,1)[0];
  cur.splice(destIdx,0,moved);answers[currentQ]=cur;
  e.currentTarget.classList.remove('drag-over');renderQ();
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function totalPts(quiz){return(quiz.questions||[]).reduce((s,q)=>{if(q.type==='mc')return s+Math.max(...q.options.map(o=>o.pts));if(q.type==='tf')return s+Math.max(parseFloat(q.truePts||0),parseFloat(q.falsePts||0));if(q.type==='fill')return s+parseFloat(q.pts||1);if(q.type==='order')return s+parseFloat(q.pts||1);return s;},0);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
